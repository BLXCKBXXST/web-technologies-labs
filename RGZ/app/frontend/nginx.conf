# Конфигурация nginx фронтенд-контейнера.
# SPA + статика и медиа (с поддержкой Range) + проксирование API на бэкенд.
server {
    listen 80;
    server_name _;
    client_max_body_size 250m;

    root /usr/share/nginx/html;
    index index.html;

    # REST API -> WSGI-сервер бэкенда.
    location /api/ {
        proxy_pass http://videohost-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin -> бэкенд (статика админки уже отдаётся через /static/).
    location /admin/ {
        proxy_pass http://videohost-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Загруженные видео и превью — nginx отдаёт файлы напрямую с поддержкой Range.
    location /media/ {
        alias /srv/media/;
    }

    # Собранная статика Django (админка).
    location /static/ {
        alias /srv/static/;
    }

    # SPA: любой неизвестный путь возвращает index.html (History API).
    location / {
        try_files $uri /index.html;
    }
}
