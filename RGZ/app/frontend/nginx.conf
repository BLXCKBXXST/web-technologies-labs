# Конфигурация nginx фронтенд-контейнера blxck.hub.
# SPA + статика и медиа (с поддержкой Range) + проксирование API и WebSocket.
server {
    listen 80;
    server_name _;
    client_max_body_size 250m;

    root /usr/share/nginx/html;
    index index.html;

    # REST API -> ASGI-сервер бэкенда.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket комнат -> бэкенд (с апгрейдом протокола).
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Загруженные видео и превью — nginx отдаёт файлы напрямую с поддержкой Range.
    location /media/ {
        alias /srv/media/;
    }

    # Собранная статика Django (админка).
    location /static/ {
        alias /srv/static/;
    }

    # SPA: любой неизвестный путь возвращает index.html (History API).
    location / {
        try_files $uri /index.html;
    }
}
