# Самодостаточный стек: `docker compose up --build` поднимает приложение
# целиком (БД, бэкенд, фронтенд) и публикует его на :8080.
#
# Локальная разработка ведётся нативно (venv + npm run dev). Этот compose —
# для демонстрации, проверки «как на сервере» и как образец прод-развёртывания.
# Имена сервисов с префиксом videohost- совпадают с теми, что deploy.sh
# добавляет в общий стек сервера.

services:
  videohost-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: videohost
      POSTGRES_USER: videohost
      POSTGRES_PASSWORD: videohost
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U videohost']
      interval: 5s
      retries: 10

  videohost-backend:
    build: ./app/backend
    environment:
      DJANGO_SECRET_KEY: compose-demo-secret-key
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: '*'
      DATABASE_URL: postgres://videohost:videohost@videohost-db:5432/videohost
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      videohost-db:
        condition: service_healthy

  videohost-frontend:
    build: ./app/frontend
    ports:
      - '8080:80'
    volumes:
      - media:/srv/media:ro
      - static:/srv/static:ro
    depends_on:
      - videohost-backend

volumes:
  pgdata:
  media:
  static:
