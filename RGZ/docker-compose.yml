# Самодостаточный стек blxck.hub: `docker compose up --build` поднимает всё
# приложение целиком (БД, Redis, бэкенд, фронтенд) и публикует его на :8080.
#
# Локальная разработка ведётся нативно (venv + npm run dev). Этот compose —
# для демонстрации, проверки «как на сервере» и как образец прод-развёртывания.
# Имена сервисов с префиксом blxckhub- совпадают с теми, что deploy.sh
# добавляет в общий стек сервера, — поэтому nginx.conf един для обоих окружений.

services:
  blxckhub-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blxckhub
      POSTGRES_USER: blxckhub
      POSTGRES_PASSWORD: blxckhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blxckhub']
      interval: 5s
      retries: 10

  blxckhub-redis:
    image: redis:7-alpine

  blxckhub-backend:
    build: ./app/backend
    environment:
      DJANGO_SECRET_KEY: compose-demo-secret-key
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: '*'
      DATABASE_URL: postgres://blxckhub:blxckhub@blxckhub-db:5432/blxckhub
      REDIS_URL: redis://blxckhub-redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      blxckhub-db:
        condition: service_healthy
      blxckhub-redis:
        condition: service_started

  blxckhub-frontend:
    build: ./app/frontend
    ports:
      - '8080:80'
    volumes:
      - media:/srv/media:ro
      - static:/srv/static:ro
    depends_on:
      - blxckhub-backend

volumes:
  pgdata:
  media:
  static:
