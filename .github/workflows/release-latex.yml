name: Release zips

on:
  push:
    branches: [main]
    paths:
      - 'lab*/**'
      - '.github/workflows/release-latex.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build LaTeX zips
        shell: bash
        run: |
          for lab_dir in lab*/latex-report; do
            lab=$(echo "$lab_dir" | cut -d'/' -f1)
            (cd "$lab_dir" && zip -r "../../${lab}_overleaf.zip" . \
              --exclude "screenshots/*" \
              --exclude "README.md")
            echo "✓ Built ${lab}_overleaf.zip"
          done

      - name: Build scripts zips
        shell: bash
        run: |
          for lab in lab4 lab5 lab6 lab7 lab8 lab9; do
            [ -d "$lab" ] || continue
            (cd "$lab" && zip -r "../${lab}_scripts.zip" . \
              --exclude "latex-report/*" \
              --exclude "*.pdf" \
              --exclude "README.md")
            echo "✓ Built ${lab}_scripts.zip"
          done

      - name: Upload zips to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: overleaf-zips
          name: "ZIP archives"
          body: |
            Автоматически собранные архивы.

            `labN_overleaf.zip` — LaTeX-отчёт для импорта в Overleaf (bez screenshots/ и README.md).
            `labN_scripts.zip` — bash-скрипты лабы (bez latex-report/ и PDF).
          files: |
            *_overleaf.zip
            lab*_scripts.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
